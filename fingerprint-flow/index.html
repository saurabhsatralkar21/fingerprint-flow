<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerprint Flow</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0c;
            color: #e8e6e1;
            font-family: 'DM Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            font-size: 0.7rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 1.5rem;
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b88;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .badge.ready .dot {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e88;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 400;
            line-height: 1.1;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            color: #f97316;
        }

        .subtitle {
            font-size: 0.8rem;
            line-height: 1.7;
            color: #666;
            margin-bottom: 2.5rem;
        }

        #identify-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: #f97316;
            color: #0a0a0c;
            border: none;
            border-radius: 8px;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.2s ease;
        }

        #identify-btn:hover {
            background: #fb923c;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(249,115,22,0.3);
        }

        #identify-btn:active {
            transform: translateY(0);
        }

        #result {
            margin-top: 2rem;
            text-align: left;
        }

        #result .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        #result .card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #999;
            margin-bottom: 1rem;
        }

        #result .field {
            margin-bottom: 0.75rem;
        }

        #result .field label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            margin-bottom: 4px;
        }

        #result .field code {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: #f97316;
            background: rgba(249,115,22,0.08);
            padding: 8px 12px;
            border-radius: 6px;
            word-break: break-all;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #444;
        }

        footer a {
            color: #f97316;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge" id="status-badge">
            <span class="dot"></span>
            <span>Awaiting Flow injection</span>
        </div>

        <h1>Fingerprint <em>Flow</em></h1>
        <p class="subtitle">
            Browser identification powered by FingerprintJS.<br>
            Once Flow is deployed, the agent loads automatically.
        </p>

        <button id="identify-btn">Generate Visitor ID</button>

        <div id="result"></div>
    </div>

    <footer>
        Built with <a href="https://fingerprint.com" target="_blank">Fingerprint</a>
    </footer>
</body>
</html>
